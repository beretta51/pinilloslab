<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0;url=/">
<title>Pinillos Lab</title>
<meta name="robots" content="noindex,follow">
<style>
  html, body { margin: 0; padding: 0; background: #F2EFE6; color: #0A0A0A; font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; height: 100%; }
  body { display: flex; align-items: center; justify-content: center; }
  .wrap { text-align: center; padding: 32px; }
  h1 { font-size: 28px; font-weight: 700; margin: 0 0 12px; letter-spacing: -0.02em; }
  p { font-size: 14px; color: #6E6E6E; margin: 0; }
  a { color: #0A0A0A; text-decoration: underline; }
</style>
<script>
  // SPA fallback for GitHub Pages: any path that isn't a real file gets routed
  // here. Pass the original path to index.html via the `p` query param so the
  // client-side router can restore it with history.replaceState.
  (function () {
    var path = window.location.pathname + window.location.search + window.location.hash;
    if (path === '/' || path === '') return;
    var separator = window.location.search ? '&' : '?';
    window.location.replace('/' + separator + 'p=' + encodeURIComponent(path));
  })();
</script>
</head>
<body>
  <div class="wrap">
    <h1>Redirecting…</h1>
    <p>If you aren't redirected, <a href="/">go to the homepage</a>.</p>
  </div>
</body>
</html>
